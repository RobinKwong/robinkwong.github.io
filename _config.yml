# Site settings
title: Robin Kwong | Project management in newsrooms
baseurl: ""
url: "https://www.robinkwong.com"
description: "Personal website of Robin Kwong, New Formats Editor at The Wall Street Journal, where he writes about project management in newsrooms and design thinking in journalism"
# Build settings
include: [_pages]
markdown: kramdown
encoding: utf-8
permalink: /:year/:month/:title
sass:
  style: compressed
# NOTE: this must be `plugins:`, not `plugins_dir:` (which sets the local
# _plugins folder and silently disables these gem plugins).
# jekyll-feed is intentionally omitted — the RSS feed is the hand-written
# feed.xml at the repo root; enabling jekyll-feed would collide on /feed.xml.
plugins:
  - jekyll-sitemap
  - jekyll-redirect-from